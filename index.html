<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-circle"></div>
    <div class="bg-circle2"></div>

    <header>
        <div class="logo">SK<span>SCRIMS</span></div>
        <a href="https://whatsapp.com/channel/0029Vb7oXxA4NVidDg3nC83b" class="nav-join">JOIN CHANNEL</a>
    </header>

    <main>
        <section class="hero">
            <h1 class="glitch" data-text="SK PAID SCRIMS">SK PAID SCRIMS</h1>
            <p>The Ultimate 2026 Competitive Hub</p>
        </section>

        <h2 class="section-title">Next Matches</h2>
        <div class="card-grid">
            <div class="match-card">
                <div class="card-tag">LIVE SOON</div>
                <h3>Bermuda Night</h3>
                <div class="card-info">
                    <span>🕒 07:00 PM</span>
                    <span>💰 ₹500 Pool</span>
                </div>
                <a href="https://whatsapp.com/channel/0029Vb7oXxA4NVidDg3nC83b" class="btn-neon">BOOK SLOT</a>
            </div>

            <div class="match-card">
                <div class="card-tag gold-tag">MEGA EVENT</div>
                <h3>Purgatory Pro</h3>
                <div class="card-info">
                    <span>🕒 09:00 PM</span>
                    <span>💰 ₹1000 Pool</span>
                </div>
                <a href="https://whatsapp.com/channel/0029Vb7oXxA4NVidDg3nC83b" class="btn-neon">BOOK SLOT</a>
            </div>
        </div>

        <div class="glass-box">
            <h2 class="section-title">Quick Points Calc</h2>
            <div class="calc-row">
                <input type="number" id="kills" placeholder="Kills">
                <select id="placement">
                    <option value="12">#1 Booyah</option>
                    <option value="9">#2 Rank</option>
                    <option value="8">#3 Rank</option>
                    <option value="1">#10 Rank</option>
                </select>
            </div>
            <button onclick="calculateScore()" class="btn-neon wide">CALCULATE</button>
            <h3 id="resultText">Score: 0</h3>
        </div>
    </main>

    <script>
        function calculateScore() {
            let kills = parseInt(document.getElementById('kills').value) || 0;
            let placement = parseInt(document.getElementById('placement').value);
            document.getElementById('resultText').innerText = "Score: " + (kills + placement);
        }
    </script>
</body>
</html>
