<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK PAID SCRIMS | Elite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="glass-header">
        <div class="logo">SK<span>SCRIMS</span></div>
        <div class="live-indicator"><span class="dot"></span> LIVE</div>
    </header>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">🏠<span>Home</span></a>
        <a href="#register" class="nav-item">📝<span>Join</span></a>
        <a href="#scrims" class="nav-item">⚔️<span>Matches</span></a>
        <a href="#calculator" class="nav-item">📊<span>Calc</span></a>
    </nav>

    <main class="content-area">
        <section class="hero-banner">
            <div class="hero-card">
                <h2>SK SEASON 4</h2>
                <p>Register for the ₹5,000 Grand Slam</p>
                <a href="#register" class="btn-main">BOOK A SLOT</a>
            </div>
        </section>

        <section id="register" class="section">
            <h3 class="title-glow">TEAM REGISTRATION</h3>
            <div class="glass-input-box">
                <form action="https://formspree.io/f/YOUR_UNIQUE_ID" method="POST">
                    <div class="input-group-vertical">
                        <label>Team Name</label>
                        <input type="text" name="team_name" placeholder="Enter Team Name" required>
                        
                        <label>Leader WhatsApp</label>
                        <input type="tel" name="whatsapp" placeholder="91XXXXXXXXXX" required>
                        
                        <label>Select Match</label>
                        <select name="match_time">
                            <option value="07:00 PM">07:00 PM (Paid)</option>
                            <option value="09:00 PM">09:00 PM (Free)</option>
                        </select>

                        <label>Player UIDs (Player 1, 2, 3, 4)</label>
                        <textarea name="uids" rows="3" placeholder="Paste UIDs here..." required></textarea>
                    </div>
                    <button type="submit" class="btn-main wide-btn">SUBMIT REGISTRATION</button>
                </form>
            </div>
        </section>

        <div id="scrims" class="section">
            <h3 class="title-glow">DAILY SCRIMS</h3>
            <div class="match-glass-card">
                <div class="m-header"><span>Bermuda</span> <span class="m-price">₹50</span></div>
                <div class="m-body">🕒 07:00 PM • 12 Slots Left</div>
                <a href="#register" class="btn-outline">REGISTER NOW</a>
            </div>
        </div>

        <div id="calculator" class="section">
            <div class="glass-input-box">
                <h4 class="title-glow">POINTS CALCULATOR</h4>
                <div class="input-group">
                    <input type="number" id="kills" placeholder="Kills">
                    <select id="placement">
                        <option value="12">#1 (12pt)</option>
                        <option value="9">#2 (9pt)</option>
                        <option value="1">#10 (1pt)</option>
                    </select>
                </div>
                <button onclick="calculateScore()" class="btn-main wide-btn">CALCULATE</button>
                <h2 id="resultText">Result: 0</h2>
            </div>
        </div>
    </main>

    <script>
        function calculateScore() {
            let k = parseInt(document.getElementById('kills').value) || 0;
            let p = parseInt(document.getElementById('placement').value);
            document.getElementById('resultText').innerText = "Result: " + (k + p);
        }
    </script>
</body>
</html>
